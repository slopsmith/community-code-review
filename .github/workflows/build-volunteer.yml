name: Build and Publish Volunteer Image

on:
  push:
    branches: [main]
    paths:
      - "volunteer/**"
      - "!volunteer/**/*.md"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    strategy:
      matrix:
        backend: [cuda, rocm, vulkan, intel]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image tags
        id: tags
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          BACKEND: ${{ matrix.backend }}
          REPO_OWNER: ${{ github.repository_owner }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          REPO="ghcr.io/${REPO_OWNER}/volunteer"
          if [ "${EVENT_NAME}" = "release" ]; then
            TAG="${RELEASE_TAG}"
            echo "tags=${REPO}:${BACKEND},${REPO}:${BACKEND}-${TAG}" >> "$GITHUB_OUTPUT"
            if [ "$BACKEND" = "cuda" ]; then
              echo "latest_tag=${REPO}:latest,${REPO}:${TAG}" >> "$GITHUB_OUTPUT"
            fi
          else
            # Sanitize branch name for use in Docker tags
            SANITIZED_BRANCH=$(echo "${REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            if [ "${REF_NAME}" = "main" ]; then
              # Preserve backward-compatible tags for main branch builds
              echo "tags=${REPO}:${BACKEND},${REPO}:${BACKEND}-${SANITIZED_BRANCH}" >> "$GITHUB_OUTPUT"
              if [ "$BACKEND" = "cuda" ]; then
                echo "latest_tag=${REPO}:latest,${REPO}:${SANITIZED_BRANCH}" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "tags=${REPO}:${BACKEND}-${SANITIZED_BRANCH}" >> "$GITHUB_OUTPUT"
              if [ "$BACKEND" = "cuda" ]; then
                echo "latest_tag=${REPO}:${SANITIZED_BRANCH}" >> "$GITHUB_OUTPUT"
              fi
            fi
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push volunteer image (${{ matrix.backend }})
        uses: docker/build-push-action@v6
        with:
          context: volunteer
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            ORG_NAME=${{ github.repository_owner }}
            BACKEND=${{ matrix.backend }}

      # Tag the CUDA build as "latest" too (most common backend)
      - name: Tag cuda as latest
        if: matrix.backend == 'cuda' && steps.tags.outputs.latest_tag != ''
        env:
          SOURCE_TAG: ${{ steps.tags.outputs.tags }}
          LATEST_TAG: ${{ steps.tags.outputs.latest_tag }}
        run: |
          # build-push-action pushes via buildx without loading locally,
          # so we use imagetools create to retag the already-pushed image.
          FIRST_TAG=$(echo "${SOURCE_TAG}" | cut -d',' -f1)
          IFS=',' read -ra TAGS <<< "${LATEST_TAG}"
          for tag in "${TAGS[@]}"; do
            docker buildx imagetools create --tag "$tag" "$FIRST_TAG"
          done