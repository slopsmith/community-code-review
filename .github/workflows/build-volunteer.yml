name: Build and Publish Volunteer Image

on:
  push:
    branches: [main]
    paths:
      - "volunteer/**"
      - "!volunteer/**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push volunteer image
        uses: docker/build-push-action@v6
        with:
          context: volunteer
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/volunteer:latest
          build-args: ORG_NAME=${{ github.repository_owner }}