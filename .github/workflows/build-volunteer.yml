name: Build and Publish Volunteer Image

on:
  push:
    branches: [main]
    paths:
      - "volunteer/**"
      - "!volunteer/**/*.md"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    strategy:
      matrix:
        backend: [cuda, rocm, vulkan, intel]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image tags
        id: tags
        run: |
          BACKEND="${{ matrix.backend }}"
          REPO="ghcr.io/${{ github.repository_owner }}/volunteer"
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "tags=${REPO}:${BACKEND},${REPO}:${BACKEND}-${TAG}" >> "$GITHUB_OUTPUT"
            if [ "$BACKEND" = "cuda" ]; then
              echo "latest_tag=${REPO}:latest,${REPO}:${TAG}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tags=${REPO}:${BACKEND}" >> "$GITHUB_OUTPUT"
            if [ "$BACKEND" = "cuda" ]; then
              echo "latest_tag=${REPO}:latest" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push volunteer image (${{ matrix.backend }})
        uses: docker/build-push-action@v6
        with:
          context: volunteer
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            ORG_NAME=${{ github.repository_owner }}
            BACKEND=${{ matrix.backend }}

      # Tag the CUDA build as "latest" too (most common backend)
      - name: Tag cuda as latest
        if: matrix.backend == 'cuda' && steps.tags.outputs.latest_tag != ''
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.latest_tag }}"
          for tag in "${TAGS[@]}"; do
            docker tag ghcr.io/${{ github.repository_owner }}/volunteer:cuda "$tag"
            docker push "$tag"
          done